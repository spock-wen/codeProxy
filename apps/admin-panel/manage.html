<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Proxy Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- 阻塞渲染的主题恢复脚本：在 body 绘制前读取 localStorage 并应用暗色模式 -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var apply = function (isDark) {
            root.classList.toggle("dark", isDark);
            root.style.colorScheme = isDark ? "dark" : "light";
            if (isDark) {
              root.setAttribute("data-theme", "dark");
            } else {
              root.removeAttribute("data-theme");
            }
          };
          var t = localStorage.getItem("code-proxy-admin-theme");
          if (t === "dark") {
            apply(true);
          } else if (t === "light") {
            apply(false);
          } else {
            // 跟随系统偏好
            if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
              apply(true);
            }
          }
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --pl-bg: #f4f4f5;
        --pl-ring-outer: rgba(99, 102, 241, 0.6);
        --pl-ring-inner: rgba(20, 184, 166, 0.75);
        --pl-text: #64748b;
        --pl-glow-1: rgba(59, 130, 246, 0.12);
        --pl-glow-2: rgba(20, 184, 166, 0.1);
        --pl-glow-3: rgba(168, 85, 247, 0.08);
      }
      .dark {
        --pl-bg: #09090b;
        --pl-ring-outer: rgba(129, 140, 248, 0.7);
        --pl-ring-inner: rgba(94, 234, 212, 0.8);
        --pl-text: rgba(255, 255, 255, 0.5);
        --pl-glow-1: rgba(99, 102, 241, 0.18);
        --pl-glow-2: rgba(45, 212, 191, 0.12);
        --pl-glow-3: rgba(168, 85, 247, 0.1);
      }
      body {
        margin: 0;
        background-color: var(--pl-bg);
        transition: background-color 0.3s ease;
      }
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background-color: var(--pl-bg);
        opacity: 1;
        transition: opacity 0.4s ease, visibility 0.4s ease;
        font-family: "Inter", "SF Pro Text", system-ui, sans-serif;
      }
      #app-loader.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .pl-glow {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        animation: pl-glow-pulse 4s ease-in-out infinite alternate;
      }
      .pl-glow-1 {
        width: 28rem;
        height: 28rem;
        top: -8rem;
        left: -6rem;
        background: var(--pl-glow-1);
      }
      .pl-glow-2 {
        width: 24rem;
        height: 24rem;
        top: -4rem;
        right: -6rem;
        background: var(--pl-glow-2);
        animation-delay: 1.3s;
      }
      .pl-glow-3 {
        width: 28rem;
        height: 28rem;
        bottom: -8rem;
        left: 25%;
        background: var(--pl-glow-3);
        animation-delay: 2.6s;
      }
      .pl-loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: pl-content-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .pl-ring-outer {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: var(--pl-ring-outer);
        animation: pl-spin 1.6s linear infinite;
        margin-bottom: 20px;
      }
      .pl-ring-inner {
        position: absolute;
        inset: 4px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: var(--pl-ring-inner);
        animation: pl-spin-reverse 0.9s linear infinite;
      }
      .pl-text {
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.15em;
        color: var(--pl-text);
        animation: pl-text-breathe 2.4s ease-in-out infinite;
        user-select: none;
      }
      @keyframes pl-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pl-spin-reverse {
        to { transform: rotate(-360deg); }
      }
      @keyframes pl-glow-pulse {
        0%   { opacity: 0.5; transform: scale(0.95); }
        100% { opacity: 1;   transform: scale(1.05); }
      }
      @keyframes pl-text-breathe {
        0%, 100% { opacity: 0.45; }
        50%       { opacity: 1;    }
      }
      @keyframes pl-content-in {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
    </style>
  </head>

  <body>
    <div id="app-loader" aria-label="Loading">
      <div class="pl-glow pl-glow-1"></div>
      <div class="pl-glow pl-glow-2"></div>
      <div class="pl-glow pl-glow-3"></div>
      <div class="pl-loader-content">
        <div class="pl-ring-outer">
          <div class="pl-ring-inner"></div>
        </div>
        <span class="pl-text">CLI Proxy</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/manage-entry.tsx"></script>
  </body>
</html>

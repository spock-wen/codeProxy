name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem first, then the solution.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Management panel
        - Request forwarding / API compatibility
        - Auth files / OAuth accounts
        - API keys / permissions / quotas
        - Usage logs / billing / statistics
        - Models / routing / channel groups
        - Deployment / operations
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard, missing, or repetitive today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to change?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Who needs this, and when would it be used?
    validations:
      required: true

  - type: dropdown
    id: alternatives
    attributes:
      label: Are alternatives acceptable?
      options:
        - Yes, a simpler alternative is fine
        - Maybe, depends on the tradeoff
        - No, this exact behavior is needed
    validations:
      required: true

  - type: input
    id: panel-version
    attributes:
      label: Panel version
      description: Optional, copy from `/manage/#/system` if this depends on current UI behavior.
      placeholder: "panel-main-xxxx / N/A"

  - type: input
    id: backend-version
    attributes:
      label: Backend version
      description: Optional, copy from `/manage/#/system` if this depends on current backend behavior.
      placeholder: "main-xxxx / v0.x.x / N/A"

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Screenshots, examples, links, or related issues. Optional.

  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have not included API keys, auth files, cookies, tokens, or other secrets.
          required: true
